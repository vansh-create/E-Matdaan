<!DOCTYPE html>
<html lang="en">
<head>
    <title>E Matdaan Portal - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/login.css">
</head>

<body>

<div class="container">

    <h1>🇮🇳 E Matdaan Portal</h1>

    <!-- Tabs -->
    <div class="tabs">
        <button onclick="showForm('userLogin')">User Login</button>
        <button onclick="showForm('adminLogin')">Administrator Login</button>
        <button onclick="showForm('register')">Register</button>
    </div>

    <!-- USER LOGIN -->
    <form id="userLogin" class="form active">
        <h2>User Login</h2>
        <input type="text" placeholder="Voter ID / Aadhaar" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- ADMIN LOGIN -->
    <form id="adminLogin" class="form">
        <h2>Administrator Login</h2>
        <input type="text" placeholder="Admin ID" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <!-- REGISTER -->
    <form id="register" class="form">
        <h2>User Registration</h2>
        <input type="text" placeholder="Full Name" required>
        <input type="text" placeholder="Voter ID" required>
        <input type="adhaar" placeholder="Aadhaar" required>
        <input type="password" placeholder="Create Password" required>
        <button type="submit">Register</button>
    </form>

</div>

<script src="../static/login.js"></script>

</body>
</html>
